# LiveTalking + Vast.ai SRS config (WebRTC 发布 + HTTP-FLV 播放走 TCP)
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       info;

http_server {
    enabled         on;
    listen          8088;          # HTTP-FLV：被 LiveTalking 的 /srs-live 同源代理
    dir             ./objs/nginx/html;
    crossdomain     on;
}

http_api {
    enabled         on;
    listen          10100;         # SRS API（健康检查 / 流列表）
    crossdomain     on;
}

stats {
    network         0;
}

rtc_server {
    enabled         on;
    listen          10001;         # UDP：本机 WHIP 发布（LiveTalking -> SRS）
    tcp {
        enabled     on;
        listen      10200;         # TCP：外部浏览器 WHEP 播放（走 vast TCP 端口映射）
    }
    protocol        all;
    candidate       *;             # 也可按请求用 ?eip= 覆盖
    use_auto_detect_network_ip on;
    api_as_candidates on;
    resolve_api_domain on;
    ip_family       ipv4;
}

vhost __defaultVhost__ {
    rtc {
        enabled     on;
        rtmp_to_rtc on;            # 打通 RTC 发布 <-> RTMP，使 HTTP-FLV 可用
        rtc_to_rtmp on;
        nack        on;
        twcc        on;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}
