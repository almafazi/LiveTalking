services:
  app:
    build:
      context: ../control-plane
    env_file: ../control-plane/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: ../control-plane
    env_file: ../control-plane/.env
    command: php artisan queue:work --sleep=2 --tries=1 --timeout=1200
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: ../control-plane
    env_file: ../control-plane/.env
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: infra/Dockerfile.nginx
    environment:
      RUNTIME_PUBLIC_URL: ${RUNTIME_PUBLIC_URL}
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-livetalking}
      POSTGRES_USER: ${DB_USERNAME:-livetalking}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-livetalking} -d ${DB_DATABASE:-livetalking}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
