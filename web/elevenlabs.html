<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveTalking — ElevenLabs Agent</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 16px auto; padding: 0 12px; }
    h2 { margin: 0 0 12px; }
    video { width: 100%; max-width: 640px; background: #111; border-radius: 6px; }
    button { padding: 8px 16px; margin: 4px 4px 4px 0; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { color: #0a7d00; margin: 8px 0; white-space: pre-wrap; }
    #err { color: #c00; margin: 4px 0; white-space: pre-wrap; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    #text_input { flex: 1; padding: 8px; box-sizing: border-box; }
    #log { margin-top: 16px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px;
           max-height: 240px; overflow-y: auto; font-size: 14px; }
    #log .user { color: #555; }
    #log .agent { color: #0645ad; }
    #log p { margin: 6px 0; }
  </style>
</head>

<body>
  <h2>LiveTalking — ElevenLabs Agent</h2>
  <p id="status">Loading player…</p>
  <p id="err"></p>

  <video id="video_player" controls autoplay muted playsinline></video>

  <div>
    <button id="btn_start">Start conversation</button>
    <button id="btn_stop" disabled>Stop</button>
    <button id="btn_reload">Reload video</button>
  </div>

  <div class="row">
    <input id="text_input" type="text" placeholder="Type a message to the agent…" />
    <button id="btn_send" disabled>Send</button>
  </div>

  <div id="log"></div>

  <script src="mpegts-1.7.3.min.js"></script>
  <script type="module">
    // ─────────────────────────────────────────────────────────────────────────
    // LiveTalking session (rtcpush pre-creates session '0' at startup)
    // ─────────────────────────────────────────────────────────────────────────
    const SESSIONID = '0';

    const statusEl = document.getElementById('status');
    const errEl = document.getElementById('err');
    const logEl = document.getElementById('log');
    const video = document.getElementById('video_player');

    function setStatus(msg) { statusEl.textContent = msg; }
    function setError(msg) { errEl.textContent = msg || ''; }
    function appendLog(role, text) {
      if (!text) return;
      const p = document.createElement('p');
      p.className = role;
      p.textContent = (role === 'agent' ? '🤖 ' : '🗣️ ') + text;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // FLV player (same as rtcpushapi.html) — the ONLY audible source.
    // ─────────────────────────────────────────────────────────────────────────
    const flvUrl = window.location.origin + '/srs-live/live/livestream.flv';
    let flvPlayer = null;

    function loadVideo() {
      setError('');
      if (flvPlayer) {
        try { flvPlayer.destroy(); } catch (e) {}
        flvPlayer = null;
      }
      if (!window.mpegts || !mpegts.getFeatureList().mseLivePlayback) {
        setError('This browser does not support MSE live playback (mpegts.js).');
        return;
      }
      setStatus('Connecting to stream…');
      flvPlayer = mpegts.createPlayer(
        { type: 'flv', isLive: true, url: flvUrl },
        { enableStashBuffer: false, liveBufferLatencyChasing: true }
      );
      flvPlayer.attachMediaElement(video);
      flvPlayer.load();
      flvPlayer.on(mpegts.Events.ERROR, function (type, detail) {
        setError('Playback error: ' + type + ' / ' + detail);
      });
      flvPlayer.on(mpegts.Events.MEDIA_INFO, function () {
        setStatus('Streaming.');
      });
      const p = flvPlayer.play();
      if (p && p.catch) { p.catch(function (e) { setError('Autoplay blocked: ' + e); }); }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Audio helpers
    // ─────────────────────────────────────────────────────────────────────────
    function floatTo16BitPcm(float32Array) {
      const buffer = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        buffer[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return buffer;
    }

    function base64FromBytes(bytes) {
      let binary = '';
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) binary += String.fromCharCode(bytes[i]);
      return window.btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = window.atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function parsePcmSampleRate(format) {
      const match = /^pcm_(\d+)$/.exec(String(format || ''));
      return match ? Number(match[1]) : null;
    }

    // Wrap raw little-endian PCM16 mono bytes into a WAV blob.
    function pcm16ToWavBlob(pcmBytes, sampleRate) {
      const numSamples = pcmBytes.byteLength; // already bytes
      const header = new ArrayBuffer(44);
      const view = new DataView(header);
      const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
      const byteRate = sampleRate * 2; // mono, 16-bit
      writeStr(0, 'RIFF');
      view.setUint32(4, 36 + numSamples, true);
      writeStr(8, 'WAVE');
      writeStr(12, 'fmt ');
      view.setUint32(16, 16, true);       // PCM chunk size
      view.setUint16(20, 1, true);        // PCM format
      view.setUint16(22, 1, true);        // mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, 2, true);        // block align
      view.setUint16(34, 16, true);       // bits per sample
      writeStr(36, 'data');
      view.setUint32(40, numSamples, true);
      return new Blob([header, pcmBytes], { type: 'audio/wav' });
    }

    function concatBytes(chunks) {
      let total = 0;
      for (const c of chunks) total += c.byteLength;
      const out = new Uint8Array(total);
      let off = 0;
      for (const c of chunks) { out.set(c, off); off += c.byteLength; }
      return out;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Forward agent audio / control to LiveTalking
    // ─────────────────────────────────────────────────────────────────────────
    // Serialize uploads so streamed slices reach the server in order.
    let humanAudioQueue = Promise.resolve();
    function postHumanAudio(wavBlob) {
      humanAudioQueue = humanAudioQueue.then(async () => {
        const fd = new FormData();
        fd.append('sessionid', SESSIONID);
        fd.append('file', wavBlob, 'agent.wav');
        try {
          await fetch('/humanaudio', { method: 'POST', body: fd });
        } catch (e) {
          setError('humanaudio failed: ' + e);
        }
      });
      return humanAudioQueue;
    }

    function interruptTalk() {
      fetch('/interrupt_talk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionid: SESSIONID }),
      }).catch(function () {});
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Microphone capture (16 kHz mono AudioWorklet)
    // ─────────────────────────────────────────────────────────────────────────
    const CAPTURE_SAMPLE_RATE = 16000;
    const FRAME_SAMPLES = 2048;
    const MIC_AUDIO_CONSTRAINTS = {
      channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: false
    };
    const WORKLET_SOURCE = `
      class MicCaptureProcessor extends AudioWorkletProcessor {
        constructor() { super(); this._buffer = new Float32Array(${FRAME_SAMPLES}); this._length = 0; }
        process(inputs) {
          const input = inputs[0] && inputs[0][0];
          if (input) {
            let offset = 0;
            while (offset < input.length) {
              const take = Math.min(this._buffer.length - this._length, input.length - offset);
              this._buffer.set(input.subarray(offset, offset + take), this._length);
              this._length += take; offset += take;
              if (this._length === this._buffer.length) { this.port.postMessage(this._buffer.slice(0)); this._length = 0; }
            }
          }
          return true;
        }
      }
      registerProcessor("mic-capture-processor", MicCaptureProcessor);
    `;

    async function createMicCapture(onFrame) {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: MIC_AUDIO_CONSTRAINTS });
      let audioContext;
      try {
        audioContext = new AudioContext({ sampleRate: CAPTURE_SAMPLE_RATE });
        const workletUrl = URL.createObjectURL(new Blob([WORKLET_SOURCE], { type: 'text/javascript' }));
        try { await audioContext.audioWorklet.addModule(workletUrl); }
        finally { URL.revokeObjectURL(workletUrl); }
        const source = audioContext.createMediaStreamSource(stream);
        const node = new AudioWorkletNode(audioContext, 'mic-capture-processor', { numberOfInputs: 1, numberOfOutputs: 0 });
        node.port.onmessage = (event) => onFrame(event.data);
        source.connect(node);
        if (audioContext.state !== 'running') await audioContext.resume();
        let stopped = false;
        return {
          stop() {
            if (stopped) return; stopped = true;
            try { node.port.onmessage = null; } catch (e) {}
            try { source.disconnect(); } catch (e) {}
            try { node.disconnect(); } catch (e) {}
            stream.getTracks().forEach((t) => t.stop());
            audioContext.close().catch(() => {});
          }
        };
      } catch (err) {
        stream.getTracks().forEach((t) => t.stop());
        if (audioContext) audioContext.close().catch(() => {});
        throw err;
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Trimmed ElevenLabs ConvAI client — streams agent PCM to LiveTalking in
    // small slices (low latency) as it arrives. No local playback.
    // ─────────────────────────────────────────────────────────────────────────
    const FLUSH_MS = 200;          // ship a slice once ~200ms of audio is buffered
    const TAIL_IDLE_MS = 250;      // flush the sub-threshold tail promptly
    const MAX_PENDING_AUDIO_CHUNKS = 80;

    class ConvaiClient {
      constructor(handlers = {}) {
        this.handlers = handlers;
        this.ws = null;
        this.ready = false;
        this.closing = false;
        this.sampleRate = 16000;
        this.formatOk = true;
        this.conversationId = null;
        this.pendingAudio = [];
        this.turnChunks = null;        // buffered Uint8Array PCM16 bytes (current slice) or null
        this.turnBytes = 0;
        this.idleTimer = null;
      }

      isOpen() { return Boolean(this.ws && this.ws.readyState === WebSocket.OPEN); }

      connect({ signedUrl, language }) {
        return new Promise((resolve, reject) => {
          let settled = false;
          const ws = new WebSocket(signedUrl);
          this.ws = ws;

          ws.onopen = () => {
            const init = { type: 'conversation_initiation_client_data' };
            if (language) init.conversation_config_override = { agent: { language } };
            ws.send(JSON.stringify(init));
          };

          ws.onmessage = (event) => {
            let data;
            try { data = JSON.parse(event.data); } catch { return; }
            if (data.type === 'conversation_initiation_metadata') {
              const meta = data.conversation_initiation_metadata_event || {};
              this.conversationId = meta.conversation_id || null;
              const rate = parsePcmSampleRate(meta.agent_output_audio_format);
              if (rate) { this.sampleRate = rate; this.formatOk = true; }
              else {
                this.formatOk = false;
                this.handlers.onError?.('Agent output format is "' + meta.agent_output_audio_format +
                  '", not PCM. Set the ElevenLabs agent output to pcm_16000 (or pcm_24000).');
              }
              this.ready = true;
              this.flushPendingAudio();
              if (!settled) { settled = true; resolve(this); }
              this.handlers.onReady?.({ sampleRate: this.sampleRate });
              return;
            }
            this.handleEvent(data);
          };

          ws.onerror = () => { if (!settled) { settled = true; reject(new Error('ConvAI connection failed')); } };

          ws.onclose = (event) => {
            const wasClosing = this.closing;
            if (this.ws === ws) { this.ws = null; this.ready = false; this.pendingAudio = []; this.flushTurn(); }
            if (!settled) { settled = true; reject(new Error('ConvAI closed before ready')); return; }
            if (!wasClosing) this.handlers.onDisconnect?.();
          };
        });
      }

      handleEvent(data) {
        switch (data.type) {
          case 'ping':
            this.sendJson({ type: 'pong', event_id: data.ping_event?.event_id });
            return;
          case 'audio':
            this.handleAudioEvent(data.audio_event || {});
            return;
          case 'agent_response':
            this.handlers.onAgentResponse?.(data.agent_response_event?.agent_response || '');
            return;
          case 'agent_response_correction':
            this.handlers.onAgentResponseCorrection?.(
              data.agent_response_correction_event?.corrected_agent_response || '');
            return;
          case 'user_transcript':
            this.flushTurn();
            this.handlers.onUserTranscript?.(data.user_transcription_event?.user_transcript || '');
            return;
          case 'interruption':
            this.discardTurn();
            this.handlers.onInterruption?.();
            return;
          default:
            // informational
        }
      }

      handleAudioEvent(audioEvent) {
        const b64 = audioEvent.audio_base_64;
        if (!b64 || !this.formatOk) return;
        if (!this.turnChunks) { this.turnChunks = []; this.turnBytes = 0; }
        const bytes = base64ToBytes(b64);
        this.turnChunks.push(bytes);
        this.turnBytes += bytes.byteLength;
        // Stream to LiveTalking as soon as ~FLUSH_MS of audio is buffered so the
        // avatar starts speaking without waiting for the whole turn.
        const flushBytes = Math.floor(this.sampleRate * 2 * (FLUSH_MS / 1000));
        if (this.turnBytes >= flushBytes) this.flushTurn();
        else this.armTailTimer();
      }

      armTailTimer() {
        if (this.idleTimer) clearTimeout(this.idleTimer);
        this.idleTimer = setTimeout(() => { this.idleTimer = null; this.flushTurn(); }, TAIL_IDLE_MS);
      }

      // Ship whatever PCM is currently buffered to LiveTalking as a WAV slice.
      flushTurn() {
        if (this.idleTimer) { clearTimeout(this.idleTimer); this.idleTimer = null; }
        if (!this.turnChunks || this.turnBytes === 0) { this.turnChunks = null; this.turnBytes = 0; return; }
        const pcm = concatBytes(this.turnChunks);
        this.turnChunks = null; this.turnBytes = 0;
        postHumanAudio(pcm16ToWavBlob(pcm, this.sampleRate));
      }

      // Drop the buffered slice without sending (barge-in).
      discardTurn() {
        if (this.idleTimer) { clearTimeout(this.idleTimer); this.idleTimer = null; }
        this.turnChunks = null; this.turnBytes = 0;
      }

      sendJson(payload) { if (!this.isOpen()) return false; this.ws.send(JSON.stringify(payload)); return true; }

      sendAudioChunk(float32Frame) {
        const pcm16 = floatTo16BitPcm(float32Frame);
        const b64 = base64FromBytes(new Uint8Array(pcm16.buffer));
        if (!this.ready || !this.isOpen()) {
          if (this.pendingAudio.length < MAX_PENDING_AUDIO_CHUNKS) this.pendingAudio.push(b64);
          return;
        }
        this.sendJson({ user_audio_chunk: b64 });
      }

      flushPendingAudio() {
        const pending = this.pendingAudio; this.pendingAudio = [];
        for (const b64 of pending) this.sendJson({ user_audio_chunk: b64 });
      }

      sendUserMessage(text) { return this.sendJson({ type: 'user_message', text }); }

      end() {
        this.closing = true;
        this.discardTurn();
        try { this.ws?.close(); } catch (e) {}
        this.ws = null; this.ready = false; this.pendingAudio = [];
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Wiring
    // ─────────────────────────────────────────────────────────────────────────
    const btnStart = document.getElementById('btn_start');
    const btnStop = document.getElementById('btn_stop');
    const btnSend = document.getElementById('btn_send');
    const btnReload = document.getElementById('btn_reload');
    const textInput = document.getElementById('text_input');

    let client = null;
    let mic = null;

    async function fetchSignedUrl() {
      const res = await fetch('/api/elevenlabs/signed-url');
      const data = await res.json();
      if (data && data.signedUrl) return data.signedUrl;
      throw new Error((data && (data.msg || data.error)) || 'No signedUrl returned');
    }

    function makeHandlers() {
      return {
        onReady: ({ sampleRate }) => setStatus('Agent connected (PCM ' + sampleRate + ' Hz). Speak or type.'),
        onError: (msg) => setError(msg),
        onDisconnect: () => { setStatus('Agent disconnected.'); teardownConversation(); },
        onUserTranscript: (text) => appendLog('user', text),
        onAgentResponse: (text) => appendLog('agent', text),
        onAgentResponseCorrection: (text) => appendLog('agent', '(corrected) ' + text),
        onInterruption: () => interruptTalk(),
      };
    }

    async function startConversation() {
      setError('');
      btnStart.disabled = true;
      try {
        setStatus('Requesting signed URL…');
        const signedUrl = await fetchSignedUrl();
        setStatus('Connecting to agent…');
        client = new ConvaiClient(makeHandlers());
        await client.connect({ signedUrl });
        // Barge-in: when the user starts talking, stop the current avatar speech.
        mic = await createMicCapture((frame) => {
          client.sendAudioChunk(frame);
        });
        btnStop.disabled = false;
        btnSend.disabled = false;
      } catch (e) {
        setError('Start failed: ' + (e && e.message ? e.message : e));
        teardownConversation();
      }
    }

    function teardownConversation() {
      if (mic) { try { mic.stop(); } catch (e) {} mic = null; }
      if (client) { try { client.end(); } catch (e) {} client = null; }
      btnStart.disabled = false;
      btnStop.disabled = true;
      btnSend.disabled = true;
    }

    function sendText() {
      const text = textInput.value.trim();
      if (!text || !client) return;
      interruptTalk();            // barge-in on the current avatar speech
      client.discardTurn();
      client.sendUserMessage(text);
      appendLog('user', text);
      textInput.value = '';
    }

    btnStart.addEventListener('click', startConversation);
    btnStop.addEventListener('click', () => { teardownConversation(); setStatus('Stopped.'); });
    btnSend.addEventListener('click', sendText);
    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });
    btnReload.addEventListener('click', loadVideo);
    window.addEventListener('load', loadVideo);
    window.addEventListener('beforeunload', teardownConversation);
  </script>
</body>

</html>
