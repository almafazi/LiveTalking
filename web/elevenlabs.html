<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveTalking — ElevenLabs Agent</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 16px auto; padding: 0 12px; }
    h2 { margin: 0 0 12px; }
    video { width: 100%; max-width: 640px; background: #111; border-radius: 6px; }
    button { padding: 8px 16px; margin: 4px 4px 4px 0; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { color: #0a7d00; margin: 8px 0; white-space: pre-wrap; }
    #err { color: #c00; margin: 4px 0; white-space: pre-wrap; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    #text_input, #access_token { flex: 1; padding: 8px; box-sizing: border-box; }
    .hint { color: #666; font-size: 13px; margin: 4px 0 0; }
    #log { margin-top: 16px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px;
           max-height: 240px; overflow-y: auto; font-size: 14px; }
    #log .user { color: #555; }
    #log .agent { color: #0645ad; }
    #log p { margin: 6px 0; }
  </style>
</head>

<body>
  <h2>LiveTalking — ElevenLabs Agent</h2>
  <p id="status">Loading player…</p>
  <p id="err"></p>

  <video id="video_player" controls autoplay muted playsinline></video>

  <div>
    <button id="btn_start">Start conversation</button>
    <button id="btn_stop" disabled>Stop</button>
    <button id="btn_reload">Reload video</button>
  </div>

  <div class="row">
    <input id="access_token" type="password" autocomplete="off"
           placeholder="Deployment access token (required on public server)" />
  </div>
  <p class="hint">Set the same value as ELEVENLABS_ACCESS_TOKEN on Vast.ai. Localhost may leave it empty.</p>

  <div class="row">
    <input id="text_input" type="text" placeholder="Type a message to the agent…" />
    <button id="btn_send" disabled>Send</button>
  </div>

  <div id="log"></div>

  <script src="srs.sdk.js"></script>
  <script src="mpegts-1.7.3.min.js"></script>
  <script type="module">
    // ─────────────────────────────────────────────────────────────────────────
    // LiveTalking session (rtcpush pre-creates session '0' at startup)
    // ─────────────────────────────────────────────────────────────────────────
    const SESSIONID = '0';

    const statusEl = document.getElementById('status');
    const errEl = document.getElementById('err');
    const logEl = document.getElementById('log');
    const video = document.getElementById('video_player');

    function setStatus(msg) { statusEl.textContent = msg; }
    function setError(msg) { errEl.textContent = msg || ''; }
    function appendLog(role, text) {
      if (!text) return;
      const p = document.createElement('p');
      p.className = role;
      p.textContent = (role === 'agent' ? '🤖 ' : '🗣️ ') + text;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // WHEP/WebRTC-over-TCP player with HTTP-FLV fallback.
    // ─────────────────────────────────────────────────────────────────────────
    const whepUrl = window.location.origin + '/srs-whep/rtc/v1/whep/?app=live&stream=livestream';
    const flvUrl = window.location.origin + '/srs-live/live/livestream.flv';
    const WHEP_CONNECT_TIMEOUT_MS = 8000;
    const WHEP_DISCONNECTED_GRACE_MS = 3000;

    let whepSdk = null;
    let flvPlayer = null;
    let playerGeneration = 0;
    let whepConnectTimer = null;
    let whepDisconnectTimer = null;

    function clearPlayerTimers() {
      if (whepConnectTimer) clearTimeout(whepConnectTimer);
      if (whepDisconnectTimer) clearTimeout(whepDisconnectTimer);
      whepConnectTimer = null;
      whepDisconnectTimer = null;
    }

    function closeWhep() {
      clearPlayerTimers();
      if (whepSdk) {
        try { whepSdk.close(); } catch (e) {}
        whepSdk = null;
      }
      if (video.srcObject) video.srcObject = null;
    }

    function closeFlv() {
      if (flvPlayer) {
        try { flvPlayer.destroy(); } catch (e) {}
        flvPlayer = null;
      }
      video.removeAttribute('src');
    }

    function closePlayer() {
      closeWhep();
      closeFlv();
    }

    function loadFlv(generation, reason) {
      if (generation !== playerGeneration) return;
      closeWhep();
      closeFlv();
      if (!window.mpegts || !mpegts.getFeatureList().mseLivePlayback) {
        setError('This browser does not support MSE live playback (mpegts.js).');
        return;
      }
      setStatus('Connecting via HTTP-FLV fallback…');
      if (reason) setError('WHEP unavailable; using HTTP-FLV: ' + reason);
      flvPlayer = mpegts.createPlayer(
        { type: 'flv', isLive: true, url: flvUrl },
        { enableStashBuffer: false, liveBufferLatencyChasing: true }
      );
      flvPlayer.attachMediaElement(video);
      flvPlayer.load();
      flvPlayer.on(mpegts.Events.ERROR, function (type, detail) {
        setError('Playback error: ' + type + ' / ' + detail);
      });
      flvPlayer.on(mpegts.Events.MEDIA_INFO, function () {
        if (generation === playerGeneration) setStatus('Streaming via HTTP-FLV fallback.');
      });
      const p = flvPlayer.play();
      if (p && p.catch) { p.catch(function (e) { setError('Autoplay blocked: ' + e); }); }
    }

    function loadWhep(generation) {
      if (generation !== playerGeneration) return;
      closePlayer();
      setStatus('Connecting via WHEP/WebRTC-over-TCP…');

      if (typeof SrsRtcWhipWhepAsync !== 'function') {
        loadFlv(generation, 'SRS WHEP SDK is unavailable.');
        return;
      }

      const sdk = new SrsRtcWhipWhepAsync();
      whepSdk = sdk;
      video.srcObject = sdk.stream;

      let pcConnected = false;
      const mediaKinds = new Set();
      let ready = false;

      function markReadyIfPossible() {
        if (ready || generation !== playerGeneration || sdk !== whepSdk) return;
        if (!pcConnected || !mediaKinds.has('audio') || !mediaKinds.has('video')) return;
        ready = true;
        clearPlayerTimers();
        setError('');
        setStatus('Streaming via WHEP/WebRTC-over-TCP.');
        const playPromise = video.play();
        if (playPromise && playPromise.catch) {
          playPromise.catch((e) => setError('Autoplay blocked: ' + e));
        }
      }

      function fallback(reason) {
        if (generation !== playerGeneration || sdk !== whepSdk) return;
        loadFlv(generation, reason);
      }

      const defaultOnTrack = sdk.ontrack;
      sdk.ontrack = function (event) {
        defaultOnTrack.call(sdk, event);
        if (event.track && event.track.kind) mediaKinds.add(event.track.kind);
        markReadyIfPossible();
      };

      sdk.pc.addEventListener('connectionstatechange', function () {
        if (generation !== playerGeneration || sdk !== whepSdk) return;
        const state = sdk.pc.connectionState;
        if (state === 'connected') {
          pcConnected = true;
          if (whepDisconnectTimer) clearTimeout(whepDisconnectTimer);
          whepDisconnectTimer = null;
          markReadyIfPossible();
        } else if (state === 'failed' || state === 'closed') {
          fallback('WebRTC connection ' + state + '.');
        } else if (state === 'disconnected') {
          if (whepDisconnectTimer) clearTimeout(whepDisconnectTimer);
          whepDisconnectTimer = setTimeout(function () {
            fallback('WebRTC remained disconnected.');
          }, WHEP_DISCONNECTED_GRACE_MS);
        }
      });

      whepConnectTimer = setTimeout(function () {
        fallback('No media received within 8 seconds.');
      }, WHEP_CONNECT_TIMEOUT_MS);

      sdk.play(whepUrl).catch(function (reason) {
        const detail = reason && reason.responseText ? reason.responseText : String(reason || 'signaling failed');
        fallback(detail);
      });
    }

    function loadVideo() {
      setError('');
      const generation = ++playerGeneration;
      loadWhep(generation);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Audio helpers
    // ─────────────────────────────────────────────────────────────────────────
    function floatTo16BitPcm(float32Array) {
      const buffer = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        buffer[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return buffer;
    }

    function base64FromBytes(bytes) {
      let binary = '';
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) binary += String.fromCharCode(bytes[i]);
      return window.btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = window.atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function parsePcmSampleRate(format) {
      const match = /^pcm_(\d+)$/.exec(String(format || ''));
      return match ? Number(match[1]) : null;
    }

    // Wrap raw little-endian PCM16 mono bytes into a WAV blob.
    function pcm16ToWavBlob(pcmBytes, sampleRate) {
      const numSamples = pcmBytes.byteLength; // already bytes
      const header = new ArrayBuffer(44);
      const view = new DataView(header);
      const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
      const byteRate = sampleRate * 2; // mono, 16-bit
      writeStr(0, 'RIFF');
      view.setUint32(4, 36 + numSamples, true);
      writeStr(8, 'WAVE');
      writeStr(12, 'fmt ');
      view.setUint32(16, 16, true);       // PCM chunk size
      view.setUint16(20, 1, true);        // PCM format
      view.setUint16(22, 1, true);        // mono
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, 2, true);        // block align
      view.setUint16(34, 16, true);       // bits per sample
      writeStr(36, 'data');
      view.setUint32(40, numSamples, true);
      return new Blob([header, pcmBytes], { type: 'audio/wav' });
    }

    function concatBytes(chunks) {
      let total = 0;
      for (const c of chunks) total += c.byteLength;
      const out = new Uint8Array(total);
      let off = 0;
      for (const c of chunks) { out.set(c, off); off += c.byteLength; }
      return out;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Forward agent audio / control to LiveTalking
    // ─────────────────────────────────────────────────────────────────────────
    // Serialize uploads so streamed slices reach the server in order. A new
    // generation cancels both queued and in-flight slices from older speech.
    let controlToken = null;
    let audioGeneration = 0;
    let audioQueueEpoch = 0;
    let audioUploadController = new AbortController();
    let humanAudioQueue = Promise.resolve();
    async function readApiResponse(response) {
      let data = null;
      try { data = await response.json(); } catch (e) {}
      if (!response.ok || !data || data.code !== 0) {
        throw new Error((data && data.msg) || ('HTTP ' + response.status));
      }
      return data;
    }

    function postHumanAudio(wavBlob, generation) {
      const epoch = audioQueueEpoch;
      const signal = audioUploadController.signal;
      humanAudioQueue = humanAudioQueue.then(async () => {
        if (!controlToken || generation !== audioGeneration || epoch !== audioQueueEpoch || signal.aborted) return;
        const fd = new FormData();
        fd.append('generation', String(generation));
        fd.append('file', wavBlob, 'agent.wav');
        try {
          const response = await fetch('/api/elevenlabs/audio', {
            method: 'POST', body: fd, signal,
            headers: { 'X-LiveTalking-Token': controlToken },
          });
          await readApiResponse(response);
        } catch (e) {
          if (e.name !== 'AbortError') setError('Avatar audio failed: ' + e.message);
        }
      });
      return humanAudioQueue;
    }

    function interruptTalk() {
      audioGeneration += 1;
      audioQueueEpoch += 1;
      audioUploadController.abort();
      audioUploadController = new AbortController();
      humanAudioQueue = Promise.resolve();
      if (!controlToken) return Promise.resolve();
      const token = controlToken;
      return fetch('/api/elevenlabs/interrupt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-LiveTalking-Token': token },
        body: JSON.stringify({ generation: audioGeneration }),
      }).then(readApiResponse).catch((e) => {
        if (e.name !== 'AbortError') setError('Interrupt failed: ' + e.message);
      });
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Microphone capture (16 kHz mono AudioWorklet)
    // ─────────────────────────────────────────────────────────────────────────
    const DEFAULT_CAPTURE_SAMPLE_RATE = 16000;
    const MIC_FRAME_MS = 40;
    const MIC_AUDIO_CONSTRAINTS = {
      channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: false
    };
    function makeWorkletSource(frameSamples) { return `
      class MicCaptureProcessor extends AudioWorkletProcessor {
        constructor() { super(); this._buffer = new Float32Array(${frameSamples}); this._length = 0; }
        process(inputs) {
          const input = inputs[0] && inputs[0][0];
          if (input) {
            let offset = 0;
            while (offset < input.length) {
              const take = Math.min(this._buffer.length - this._length, input.length - offset);
              this._buffer.set(input.subarray(offset, offset + take), this._length);
              this._length += take; offset += take;
              if (this._length === this._buffer.length) { this.port.postMessage(this._buffer.slice(0)); this._length = 0; }
            }
          }
          return true;
        }
      }
      registerProcessor("mic-capture-processor", MicCaptureProcessor);
    `; }

    function resampleLinear(input, outputLength) {
      if (input.length === outputLength) return input;
      const output = new Float32Array(outputLength);
      if (outputLength === 1 || input.length === 1) { output.fill(input[0] || 0); return output; }
      const scale = (input.length - 1) / (outputLength - 1);
      for (let i = 0; i < outputLength; i++) {
        const position = i * scale;
        const left = Math.floor(position);
        const right = Math.min(left + 1, input.length - 1);
        const mix = position - left;
        output[i] = input[left] * (1 - mix) + input[right] * mix;
      }
      return output;
    }

    async function createMicCapture(stream, onFrame, targetSampleRate) {
      let audioContext;
      try {
        audioContext = new AudioContext({ sampleRate: targetSampleRate, latencyHint: 'interactive' });
        const sourceFrameSamples = Math.max(1, Math.round(audioContext.sampleRate * MIC_FRAME_MS / 1000));
        const targetFrameSamples = Math.max(1, Math.round(targetSampleRate * MIC_FRAME_MS / 1000));
        const workletUrl = URL.createObjectURL(new Blob(
          [makeWorkletSource(sourceFrameSamples)], { type: 'text/javascript' }));
        try { await audioContext.audioWorklet.addModule(workletUrl); }
        finally { URL.revokeObjectURL(workletUrl); }
        const source = audioContext.createMediaStreamSource(stream);
        const node = new AudioWorkletNode(audioContext, 'mic-capture-processor', { numberOfInputs: 1, numberOfOutputs: 0 });
        node.port.onmessage = (event) => onFrame(resampleLinear(event.data, targetFrameSamples));
        source.connect(node);
        if (audioContext.state !== 'running') await audioContext.resume();
        let stopped = false;
        return {
          stop() {
            if (stopped) return; stopped = true;
            try { node.port.onmessage = null; } catch (e) {}
            try { source.disconnect(); } catch (e) {}
            try { node.disconnect(); } catch (e) {}
            stream.getTracks().forEach((t) => t.stop());
            audioContext.close().catch(() => {});
          },
          inputSampleRate: targetSampleRate,
          deviceSampleRate: audioContext.sampleRate,
        };
      } catch (err) {
        stream.getTracks().forEach((t) => t.stop());
        if (audioContext) audioContext.close().catch(() => {});
        throw err;
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Trimmed ElevenLabs ConvAI client — streams agent PCM to LiveTalking in
    // small slices (low latency) as it arrives. No local playback.
    // ─────────────────────────────────────────────────────────────────────────
    const FLUSH_MS = 200;          // ship a slice once ~200ms of audio is buffered
    const TAIL_IDLE_MS = 250;      // flush the sub-threshold tail promptly
    const STALE_AUDIO_GUARD_MS = 250;
    const MAX_PENDING_AUDIO_CHUNKS = 80;

    class ConvaiClient {
      constructor(handlers = {}) {
        this.handlers = handlers;
        this.ws = null;
        this.ready = false;
        this.closing = false;
        this.sampleRate = 16000;
        this.inputSampleRate = DEFAULT_CAPTURE_SAMPLE_RATE;
        this.conversationId = null;
        this.pendingAudio = [];
        this.turnChunks = null;        // buffered Uint8Array PCM16 bytes (current slice) or null
        this.turnBytes = 0;
        this.pcmRemainder = new Uint8Array(0);
        this.idleTimer = null;
        this.agentAudioUntil = 0;
        this.suppressAgentAudioUntil = 0;
      }

      isOpen() { return Boolean(this.ws && this.ws.readyState === WebSocket.OPEN); }

      connect({ signedUrl, language }) {
        return new Promise((resolve, reject) => {
          let settled = false;
          const ws = new WebSocket(signedUrl);
          this.ws = ws;

          ws.onopen = () => {
            const init = { type: 'conversation_initiation_client_data' };
            if (language) init.conversation_config_override = { agent: { language } };
            ws.send(JSON.stringify(init));
          };

          ws.onmessage = (event) => {
            let data;
            try { data = JSON.parse(event.data); } catch { return; }
            if (data.type === 'conversation_initiation_metadata') {
              const meta = data.conversation_initiation_metadata_event || {};
              this.conversationId = meta.conversation_id || null;
              const outputRate = parsePcmSampleRate(meta.agent_output_audio_format);
              const inputRate = parsePcmSampleRate(meta.user_input_audio_format);
              if (!outputRate || !inputRate) {
                const message = 'ElevenLabs audio must use PCM. Current formats: output="' +
                  meta.agent_output_audio_format + '", input="' + meta.user_input_audio_format + '".';
                this.handlers.onError?.(message);
                this.closing = true;
                try { ws.close(); } catch (e) {}
                if (!settled) { settled = true; reject(new Error(message)); }
                return;
              }
              this.sampleRate = outputRate;
              this.inputSampleRate = inputRate;
              this.ready = true;
              this.flushPendingAudio();
              if (!settled) { settled = true; resolve(this); }
              this.handlers.onReady?.({
                sampleRate: this.sampleRate,
                inputSampleRate: this.inputSampleRate,
              });
              return;
            }
            this.handleEvent(data);
          };

          ws.onerror = () => { if (!settled) { settled = true; reject(new Error('ConvAI connection failed')); } };

          ws.onclose = (event) => {
            const wasClosing = this.closing;
            if (this.ws === ws) { this.ws = null; this.ready = false; this.pendingAudio = []; this.discardTurn(); }
            if (!settled) { settled = true; reject(new Error('ConvAI closed before ready')); return; }
            if (!wasClosing) this.handlers.onDisconnect?.();
          };
        });
      }

      handleEvent(data) {
        switch (data.type) {
          case 'ping':
            this.sendJson({ type: 'pong', event_id: data.ping_event?.event_id });
            return;
          case 'audio':
            this.handleAudioEvent(data.audio_event || {});
            return;
          case 'agent_response':
            this.handlers.onAgentResponse?.(data.agent_response_event?.agent_response || '');
            return;
          case 'agent_response_correction':
            this.handlers.onAgentResponseCorrection?.(
              data.agent_response_correction_event?.corrected_agent_response || '');
            return;
          case 'user_transcript':
            this.flushTurn(true);
            this.handlers.onUserTranscript?.(data.user_transcription_event?.user_transcript || '');
            return;
          case 'interruption':
            this.discardTurn(STALE_AUDIO_GUARD_MS);
            this.handlers.onInterruption?.();
            return;
          default:
            // informational
        }
      }

      handleAudioEvent(audioEvent) {
        const b64 = audioEvent.audio_base_64;
        if (!b64 || performance.now() < this.suppressAgentAudioUntil) return;
        if (!this.turnChunks) { this.turnChunks = []; this.turnBytes = 0; }
        const bytes = base64ToBytes(b64);
        const audioMs = bytes.byteLength / (this.sampleRate * 2) * 1000;
        this.agentAudioUntil = Math.max(performance.now(), this.agentAudioUntil) + audioMs;
        this.turnChunks.push(bytes);
        this.turnBytes += bytes.byteLength;
        // Stream to LiveTalking as soon as ~FLUSH_MS of audio is buffered so the
        // avatar starts speaking without waiting for the whole turn.
        const flushBytes = Math.floor(this.sampleRate * 2 * (FLUSH_MS / 1000));
        if (this.turnBytes >= flushBytes) this.flushTurn(false);
        else this.armTailTimer();
      }

      armTailTimer() {
        if (this.idleTimer) clearTimeout(this.idleTimer);
        this.idleTimer = setTimeout(() => { this.idleTimer = null; this.flushTurn(true); }, TAIL_IDLE_MS);
      }

      // Ship only complete 20 ms frames. Carry partial frames across requests so
      // BaseAvatar's 320-sample framing never drops audio at WAV boundaries.
      flushTurn(final = false) {
        if (this.idleTimer) { clearTimeout(this.idleTimer); this.idleTimer = null; }
        const chunks = [];
        if (this.pcmRemainder.byteLength) chunks.push(this.pcmRemainder);
        if (this.turnChunks) chunks.push(...this.turnChunks);
        this.turnChunks = null; this.turnBytes = 0;
        if (!chunks.length) return;

        const pcm = concatBytes(chunks);
        const frameBytes = Math.max(2, Math.round(this.sampleRate * 0.02) * 2);
        let sendBytes = Math.floor(pcm.byteLength / frameBytes) * frameBytes;
        if (final && sendBytes < pcm.byteLength) sendBytes += frameBytes;
        if (sendBytes === 0) { this.pcmRemainder = pcm; return; }

        const aligned = new Uint8Array(sendBytes);
        aligned.set(pcm.subarray(0, Math.min(pcm.byteLength, sendBytes)));
        this.pcmRemainder = final ? new Uint8Array(0) : pcm.slice(sendBytes);
        postHumanAudio(pcm16ToWavBlob(aligned, this.sampleRate), audioGeneration);
      }

      // Drop the buffered slice without sending (barge-in).
      discardTurn(suppressMs = 0) {
        if (this.idleTimer) { clearTimeout(this.idleTimer); this.idleTimer = null; }
        this.turnChunks = null; this.turnBytes = 0;
        this.pcmRemainder = new Uint8Array(0);
        this.agentAudioUntil = 0;
        if (suppressMs > 0) {
          this.suppressAgentAudioUntil = Math.max(
            this.suppressAgentAudioUntil, performance.now() + suppressMs);
        }
      }

      isAgentSpeaking() { return performance.now() < this.agentAudioUntil; }

      sendJson(payload) { if (!this.isOpen()) return false; this.ws.send(JSON.stringify(payload)); return true; }

      sendAudioChunk(float32Frame) {
        const pcm16 = floatTo16BitPcm(float32Frame);
        const b64 = base64FromBytes(new Uint8Array(pcm16.buffer));
        if (!this.ready || !this.isOpen()) {
          if (this.pendingAudio.length < MAX_PENDING_AUDIO_CHUNKS) this.pendingAudio.push(b64);
          return;
        }
        this.sendJson({ user_audio_chunk: b64 });
      }

      flushPendingAudio() {
        const pending = this.pendingAudio; this.pendingAudio = [];
        for (const b64 of pending) this.sendJson({ user_audio_chunk: b64 });
      }

      sendUserMessage(text) { return this.sendJson({ type: 'user_message', text }); }

      end() {
        this.closing = true;
        this.discardTurn();
        try { this.ws?.close(); } catch (e) {}
        this.ws = null; this.ready = false; this.pendingAudio = [];
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Wiring
    // ─────────────────────────────────────────────────────────────────────────
    const btnStart = document.getElementById('btn_start');
    const btnStop = document.getElementById('btn_stop');
    const btnSend = document.getElementById('btn_send');
    const btnReload = document.getElementById('btn_reload');
    const textInput = document.getElementById('text_input');
    const accessTokenInput = document.getElementById('access_token');

    let client = null;
    let mic = null;
    let pendingMicStream = null;

    async function fetchSignedUrl() {
      const deploymentToken = accessTokenInput.value.trim();
      const headers = deploymentToken ? { 'X-ElevenLabs-Access-Token': deploymentToken } : {};
      const res = await fetch('/api/elevenlabs/signed-url?sessionid=' + encodeURIComponent(SESSIONID), {
        headers, cache: 'no-store',
      });
      let data = null;
      try { data = await res.json(); } catch (e) {}
      if (!res.ok || !data || !data.signedUrl || !data.controlToken) {
        throw new Error((data && (data.msg || data.error)) || ('Signed URL failed: HTTP ' + res.status));
      }
      controlToken = data.controlToken;
      audioGeneration = Number.isInteger(data.generation) ? data.generation : 0;
      audioQueueEpoch += 1;
      audioUploadController.abort();
      audioUploadController = new AbortController();
      humanAudioQueue = Promise.resolve();
      return data.signedUrl;
    }

    function makeHandlers() {
      return {
        onReady: ({ sampleRate, inputSampleRate }) => setStatus(
          'Agent connected (output ' + sampleRate + ' Hz, input ' + inputSampleRate + ' Hz). Starting mic…'),
        onError: (msg) => setError(msg),
        onDisconnect: () => { setStatus('Agent disconnected. Click Start to reconnect.'); teardownConversation(); },
        onUserTranscript: (text) => appendLog('user', text),
        onAgentResponse: (text) => appendLog('agent', text),
        onAgentResponseCorrection: (text) => appendLog('agent', '(corrected) ' + text),
        onInterruption: () => interruptTalk(),
      };
    }

    async function startConversation() {
      setError('');
      btnStart.disabled = true;
      try {
        video.muted = false;
        video.play().catch(() => {});
        setStatus('Requesting microphone permission…');
        pendingMicStream = await navigator.mediaDevices.getUserMedia({ audio: MIC_AUDIO_CONSTRAINTS });
        setStatus('Requesting signed URL…');
        const signedUrl = await fetchSignedUrl();
        setStatus('Connecting to agent…');
        client = new ConvaiClient(makeHandlers());
        await client.connect({ signedUrl });
        let speechFrames = 0;
        let lastLocalInterrupt = 0;
        mic = await createMicCapture(pendingMicStream, (frame) => {
          let energy = 0;
          for (let i = 0; i < frame.length; i++) energy += frame[i] * frame[i];
          const rms = Math.sqrt(energy / Math.max(1, frame.length));
          speechFrames = rms >= 0.03 ? speechFrames + 1 : 0;
          if (speechFrames >= 2 && client.isAgentSpeaking() && performance.now() - lastLocalInterrupt > 1000) {
            lastLocalInterrupt = performance.now();
            speechFrames = 0;
            client.discardTurn(STALE_AUDIO_GUARD_MS);
            interruptTalk();
          }
          client.sendAudioChunk(frame);
        }, client.inputSampleRate);
        pendingMicStream = null;
        setStatus('Agent connected. Speak or type (mic ' + mic.deviceSampleRate + ' → ' +
          mic.inputSampleRate + ' Hz, avatar output ' + client.sampleRate + ' Hz).');
        btnStop.disabled = false;
        btnSend.disabled = false;
      } catch (e) {
        setError('Start failed: ' + (e && e.message ? e.message : e));
        teardownConversation();
      }
    }

    function teardownConversation() {
      if (pendingMicStream) {
        pendingMicStream.getTracks().forEach((track) => track.stop());
        pendingMicStream = null;
      }
      if (mic) { try { mic.stop(); } catch (e) {} mic = null; }
      if (client) { try { client.end(); } catch (e) {} client = null; }
      audioQueueEpoch += 1;
      audioUploadController.abort();
      audioUploadController = new AbortController();
      humanAudioQueue = Promise.resolve();
      if (controlToken) {
        const token = controlToken;
        controlToken = null;
        fetch('/api/elevenlabs/end', {
          method: 'POST', keepalive: true,
          headers: { 'X-LiveTalking-Token': token },
        }).catch(() => {});
      }
      btnStart.disabled = false;
      btnStop.disabled = true;
      btnSend.disabled = true;
    }

    function sendText() {
      const text = textInput.value.trim();
      if (!text || !client) return;
      client.discardTurn(STALE_AUDIO_GUARD_MS);
      interruptTalk();            // invalidate old audio before sending the new turn
      client.sendUserMessage(text);
      appendLog('user', text);
      textInput.value = '';
    }

    btnStart.addEventListener('click', startConversation);
    btnStop.addEventListener('click', () => { teardownConversation(); setStatus('Stopped.'); });
    btnSend.addEventListener('click', sendText);
    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });
    btnReload.addEventListener('click', loadVideo);
    window.addEventListener('load', loadVideo);
    window.addEventListener('beforeunload', () => { teardownConversation(); closePlayer(); });
  </script>
</body>

</html>
