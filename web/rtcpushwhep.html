<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveTalking (WHEP low-latency)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 16px auto; padding: 0 12px; }
    h2 { margin: 0 0 12px; }
    video { width: 100%; max-width: 640px; background: #111; border-radius: 6px; }
    textarea { width: 100%; height: 70px; box-sizing: border-box; margin-top: 12px; }
    button { padding: 8px 16px; margin: 4px 4px 4px 0; cursor: pointer; }
    #status { color: #0a7d00; margin: 8px 0; white-space: pre-wrap; }
    #err { color: #c00; margin: 4px 0; white-space: pre-wrap; }
    .hint { color: #666; font-size: 13px; }
  </style>
</head>

<body>
  <h2>LiveTalking — Digital Human (WHEP)</h2>
  <p class="hint">Low-latency WebRTC-over-TCP. If the video never starts, use the FLV page (<a href="rtcpushapi.html">rtcpushapi.html</a>) instead.</p>
  <p id="status">Idle.</p>
  <p id="err"></p>

  <video id="video_player" controls autoplay muted playsinline></video>

  <div>
    <textarea id="message">Hello, this is a test.</textarea>
    <div>
      <button id="btn_play">Start / Reload</button>
      <button id="btn_send">Send</button>
    </div>
  </div>

  <script src="srs.sdk.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const errEl = document.getElementById('err');
    const video = document.getElementById('video_player');
    // Same-origin WHEP signaling, proxied to SRS by the backend (/srs-whep).
    const whepUrl = window.location.origin + '/srs-whep/rtc/v1/whep/?app=live&stream=livestream';
    let sdk = null;

    function setStatus(msg) { statusEl.textContent = msg; }
    function setError(msg) { errEl.textContent = msg || ''; }

    function startPlay() {
      setError('');
      if (sdk) { try { sdk.close(); } catch (e) {} sdk = null; }
      setStatus('Negotiating WebRTC (TCP)…');
      sdk = new SrsRtcWhipWhepAsync();
      video.srcObject = sdk.stream;
      sdk.play(whepUrl).then(function () {
        setStatus('Streaming (WebRTC).');
      }).catch(function (reason) {
        setError('WHEP play failed: ' + (reason && reason.responseText ? reason.responseText : reason));
        try { sdk.close(); } catch (e) {}
        sdk = null;
      });
    }

    function sendText() {
      const text = document.getElementById('message').value;
      if (!text.trim()) return;
      fetch('/human', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, type: 'echo', sessionid: '0' }),
      }).then(function () {
        document.getElementById('message').value = '';
      }).catch(function (e) { setError('Send failed: ' + e); });
    }

    document.getElementById('btn_play').addEventListener('click', startPlay);
    document.getElementById('btn_send').addEventListener('click', sendText);
    window.addEventListener('load', startPlay);
  </script>
</body>

</html>
